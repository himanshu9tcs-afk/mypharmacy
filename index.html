<!DOCTYPE html>
<html>
  <head>
    <title>Inventory Order</title>
    <style>
      body { font-family: Arial; max-width: 800px; margin: 20px auto; }
      .product { margin-bottom: 10px; }
      label { margin-right: 10px; }
      input[type="number"] { width: 50px; }
      .total { font-weight: bold; margin-top: 10px; }
    </style>
  </head>
  <body>
    <h2>Place Your Order</h2>
    <div id="product-list"></div>

    <h3>Customer Details</h3>
    <input id="cust-name" placeholder="Name"><br>
    <input id="cust-phone" placeholder="Phone"><br>
    <input id="cust-email" placeholder="Email"><br>
    <input id="cust-notes" placeholder="Notes (optional)"><br><br>

    <div class="total">Total: $<span id="total">0</span></div>
    <button onclick="submitOrder()">Submit Order</button>

    <script>
      let products = [];

      function fetchProducts() {
        google.script.run.withSuccessHandler(renderProducts).getProducts();
      }

      function renderProducts(data) {
        products = data;
        const container = document.getElementById("product-list");
        container.innerHTML = "";
        data.forEach((p, idx) => {
          const div = document.createElement("div");
          div.className = "product";
          div.innerHTML = `
            <label>${p.name} ($${p.price})</label>
            <input type="number" min="0" value="0" onchange="updateTotal()" data-index="${idx}">
          `;
          container.appendChild(div);
        });
      }

      function updateTotal() {
        let total = 0;
        document.querySelectorAll("#product-list input").forEach(input => {
          const idx = input.dataset.index;
          const qty = parseInt(input.value) || 0;
          total += qty * products[idx].price;
        });
        document.getElementById("total").innerText = total;
      }

      function submitOrder() {
        const customer = {
          name: document.getElementById("cust-name").value,
          phone: document.getElementById("cust-phone").value,
          email: document.getElementById("cust-email").value,
          notes: document.getElementById("cust-notes").value
        };

        const items = [];
        document.querySelectorAll("#product-list input").forEach(input => {
          const idx = input.dataset.index;
          const qty = parseInt(input.value) || 0;
          if (qty > 0) {
            items.push({ name: products[idx].name, qty, price: products[idx].price });
          }
        });

        if (!items.length) {
          alert("Please select at least one product");
          return;
        }

        google.script.run.withSuccessHandler(res => {
          if (res.success) alert("Order submitted! ID: " + res.orderId);
          else alert("Order failed: " + res.error);
        }).doPost({ postData: { contents: JSON.stringify({ customer, items }) }});
      }

      fetchProducts();
    </script>
  </body>
</html>
